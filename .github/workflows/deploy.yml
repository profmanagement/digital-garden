name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site
        run: |
          mkdir -p _site/en _site/nl
          cp style.css _site/style.css

          # ── Helpers ────────────────────────────────────────────────────────

          # Preprocess wikilinks before Pandoc:
          # [[target|label]] → [label](target.html)
          # [[target]]       → [target](target.html)
          preprocess() {
            sed -E \
              -e 's/\[\[([^|\]]+)\|([^\]]+)\]\]/[\2](\1.html)/g' \
              -e 's/\[\[([^\]]+)\]\]/[\1](\1.html)/g' \
              "$1"
          }

          # Extract a YAML frontmatter field (handles quoted & unquoted values)
          get_field() {
            grep -m1 "^$2:" "$1" | sed "s/^$2:[[:space:]]*//" | tr -d '"' | xargs
          }

          get_title() { get_field "$1" "title"; }

          # ── Root redirect ─────────────────────────────────────────────────
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en"><head><meta charset="utf-8">'
            echo '<meta http-equiv="refresh" content="0;url=en/">'
            echo '<title>Digital Garden</title>'
            echo '</head><body><a href="en/">Digital Garden</a></body></html>'
          } > _site/index.html

          # ── Generate notes listing fragments ──────────────────────────────
          # Builds _notes_listing_{lang}.html with note cards.
          # Each card shows: type badge, category, title (linked),
          # description, author, tags. Sorted newest-first by `created`.
          build_notes_listing() {
            local lang="$1"
            local dir="content/${lang}/notes"
            local out="_notes_listing_${lang}.html"
            local by_label
            [ "$lang" = "en" ] && by_label="By" || by_label="Door"
            {
              echo '<section class="notes-list">'
              while IFS= read -r f; do
                [ -f "$f" ] || continue
                local slug title type category description author written_by tags created
                slug=$(basename "${f%.md}")
                title=$(get_field "$f" "title")
                type=$(get_field "$f" "type")
                category=$(get_field "$f" "category")
                description=$(get_field "$f" "description")
                author=$(get_field "$f" "author")
                written_by=$(get_field "$f" "written_by")
                tags=$(get_field "$f" "tags")
                created=$(get_field "$f" "created")

                echo "<a href=\"${slug}.html\" class=\"note-summary\">"
                echo "  <div class=\"note-summary-title\">${title}</div>"

                # Meta line: Category | Description
                local meta=""
                [ -n "$category" ] && meta="${category}"
                [ -n "$description" ] && meta="${meta:+${meta} | }${description}"
                [ -n "$meta" ] && echo "  <div class=\"note-summary-meta\">${meta}</div>"

                # Author line: {type} By {author} ({written_by})
                echo '  <div class="note-summary-author">'
                [ -n "$type" ] && echo "    <span class=\"note-type note-type--${type}\">${type}</span>"
                [ -n "$author" ] && echo -n "    ${by_label} ${author}"
                [ -n "$written_by" ] && echo " (${written_by})" || echo ""
                echo '  </div>'

                # Footer line: Created - Tags
                local footer=""
                [ -n "$created" ] && footer="${created}"
                [ -n "$tags" ] && footer="${footer:+${footer} - }${tags}"
                [ -n "$footer" ] && echo "  <div class=\"note-summary-footer\">${footer}</div>"

                echo '</a>'
              done < <(
                for n in "$dir"/*.md; do
                  [ -f "$n" ] || continue
                  c=$(get_field "$n" "created")
                  echo "${c:-0000-00-00} $n"
                done | sort -rk1 | awk '{print $2}'
              )
              echo '</section>'
            } > "$out"
          }

          build_notes_listing en
          build_notes_listing nl

          # ── English homepage → _site/en/index.html ────────────────────────
          # NOTE: use echo statements, never heredocs inside run: | blocks.
          # See _comms/06_TROUBLESHOOTING/ for the reason.
          {
            echo '<nav class="site-nav">'
            echo '  <a class="nav-logo" href="index.html">Digital Garden</a>'
            echo '  <span class="nav-links">'
            echo '    <a href="index.html">HOME</a>'
            echo '    <span class="nav-sep">|</span>'
            echo '    <a href="about.html">ABOUT</a>'
            echo '  </span>'
            echo '  <span class="nav-right">'
            echo '    <span class="nav-lang"><a href="index.html">EN</a> &middot; <a href="../nl/index.html">NL</a></span>'
            echo '    <a class="nav-search" href="search.html">&#x1F50D;</a>'
            echo '  </span>'
            echo '</nav>'
          } > _nav_en_index.html

          pt=$(get_title "content/en/en/index.md")
          preprocess "content/en/en/index.md" | pandoc \
            --standalone \
            --css ../style.css \
            --metadata pagetitle="$pt" \
            --metadata title="" \
            --include-before-body _nav_en_index.html \
            --lua-filter .pandoc/wikilinks.lua \
            -o _site/en/index.html

          # Inject notes listing right after <h2 id="notes"> (awk one-liner)
          awk '/<h2 id="notes">/{print; while((getline line < "_notes_listing_en.html") > 0) print line; close("_notes_listing_en.html"); next}1' \
            _site/en/index.html > _tmp.html && mv _tmp.html _site/en/index.html

          # ── Dutch homepage → _site/nl/index.html ──────────────────────────
          {
            echo '<nav class="site-nav">'
            echo '  <a class="nav-logo" href="index.html">Digital Garden</a>'
            echo '  <span class="nav-links">'
            echo '    <a href="index.html">HOME</a>'
            echo '    <span class="nav-sep">|</span>'
            echo '    <a href="about.html">OVER MIJ</a>'
            echo '  </span>'
            echo '  <span class="nav-right">'
            echo '    <span class="nav-lang"><a href="../en/index.html">EN</a> &middot; <a href="index.html">NL</a></span>'
            echo '    <a class="nav-search" href="search.html">&#x1F50D;</a>'
            echo '  </span>'
            echo '</nav>'
          } > _nav_nl_index.html

          pt=$(get_title "content/nl/nl/index.md")
          preprocess "content/nl/nl/index.md" | pandoc \
            --standalone \
            --css ../style.css \
            --metadata pagetitle="$pt" \
            --metadata title="" \
            --include-before-body _nav_nl_index.html \
            --lua-filter .pandoc/wikilinks.lua \
            -o _site/nl/index.html

          # Inject notes listing right after <h2 id="notities"> (awk one-liner)
          awk '/<h2 id="notities">/{print; while((getline line < "_notes_listing_nl.html") > 0) print line; close("_notes_listing_nl.html"); next}1' \
            _site/nl/index.html > _tmp.html && mv _tmp.html _site/nl/index.html

          # ── English pages (about, search) → _site/en/ ────────────────────
          # Language switcher links to the same slug in the NL folder.
          for f in content/en/pages/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "${f%.md}")
            pt=$(get_title "$f")
            {
              echo '<nav class="site-nav">'
              echo '  <a class="nav-logo" href="index.html">Digital Garden</a>'
              echo '  <span class="nav-links">'
              echo '    <a href="index.html">HOME</a>'
              echo '    <span class="nav-sep">|</span>'
              echo '    <a href="about.html">ABOUT</a>'
              echo '  </span>'
              echo '  <span class="nav-right">'
              echo "    <span class=\"nav-lang\"><a href=\"${slug}.html\">EN</a> &middot; <a href=\"../nl/${slug}.html\">NL</a></span>"
              echo '    <a class="nav-search" href="search.html">&#x1F50D;</a>'
              echo '  </span>'
              echo '</nav>'
              echo "<p><a class=\"nav-back\" href=\"index.html\">&larr; Back</a></p>"
            } > _nav_page.html
            preprocess "$f" | pandoc \
              --standalone \
              --css ../style.css \
              --metadata pagetitle="$pt" \
              --metadata title="" \
              --include-before-body _nav_page.html \
              --lua-filter .pandoc/wikilinks.lua \
              -o "_site/en/${slug}.html"
          done

          # ── Dutch pages (about, search) → _site/nl/ ───────────────────────
          for f in content/nl/pages/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "${f%.md}")
            pt=$(get_title "$f")
            {
              echo '<nav class="site-nav">'
              echo '  <a class="nav-logo" href="index.html">Digital Garden</a>'
              echo '  <span class="nav-links">'
              echo '    <a href="index.html">HOME</a>'
              echo '    <span class="nav-sep">|</span>'
              echo '    <a href="about.html">OVER MIJ</a>'
              echo '  </span>'
              echo '  <span class="nav-right">'
              echo "    <span class=\"nav-lang\"><a href=\"../en/${slug}.html\">EN</a> &middot; <a href=\"${slug}.html\">NL</a></span>"
              echo '    <a class="nav-search" href="search.html">&#x1F50D;</a>'
              echo '  </span>'
              echo '</nav>'
              echo "<p><a class=\"nav-back\" href=\"index.html\">&larr; Terug</a></p>"
            } > _nav_page.html
            preprocess "$f" | pandoc \
              --standalone \
              --css ../style.css \
              --metadata pagetitle="$pt" \
              --metadata title="" \
              --include-before-body _nav_page.html \
              --lua-filter .pandoc/wikilinks.lua \
              -o "_site/nl/${slug}.html"
          done

          # ── English notes → _site/en/ ────────────────────────────────────
          # Each note gets: per-note nav (translation-aware lang switcher),
          # category label before <h1>, byline after <h1>, footer.
          for f in content/en/notes/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "${f%.md}")
            title=$(get_title "$f")
            category=$(get_field "$f" "category")
            author=$(get_field "$f" "author")
            note_created=$(get_field "$f" "created")
            note_modified=$(get_field "$f" "modified")
            note_version=$(get_field "$f" "version")
            written_by=$(get_field "$f" "written_by")
            translation=$(get_field "$f" "translation")

            # Language switcher: NL translation slug or fall back to NL index
            if [ -n "$translation" ]; then
              nl_link="../nl/${translation}.html"
            else
              nl_link="../nl/index.html"
            fi

            {
              echo '<nav class="site-nav">'
              echo '  <a class="nav-logo" href="index.html">Digital Garden</a>'
              echo '  <span class="nav-links">'
              echo '    <a href="index.html">HOME</a>'
              echo '    <span class="nav-sep">|</span>'
              echo '    <a href="about.html">ABOUT</a>'
              echo '  </span>'
              echo '  <span class="nav-right">'
              echo "    <span class=\"nav-lang\"><a href=\"${slug}.html\">EN</a> &middot; <a href=\"${nl_link}\">NL</a></span>"
              echo '    <a class="nav-search" href="search.html">&#x1F50D;</a>'
              echo '  </span>'
              echo '</nav>'
              echo "<p><a class=\"nav-back\" href=\"index.html\">&larr; Back</a></p>"
            } > _note_nav.html

            # Footer: created · modified · version
            footer_text=""
            [ -n "$note_created" ] && footer_text="$note_created"
            [ -n "$note_modified" ] && footer_text="${footer_text:+${footer_text} &middot; modified ${note_modified}}"
            [ -n "$note_version" ] && footer_text="${footer_text:+${footer_text} &middot; }${note_version}"
            echo "<footer class=\"note-footer\"><small>${footer_text}</small></footer>" > _note_footer.html

            preprocess "$f" | pandoc \
              --standalone \
              --css ../style.css \
              --metadata pagetitle="$title" \
              --metadata title="" \
              --include-before-body _note_nav.html \
              --include-after-body _note_footer.html \
              --lua-filter .pandoc/wikilinks.lua \
              -o "_site/en/${slug}.html"

            # Inject category label (before <h1>) and byline (after <h1>)
            byline=""
            [ -n "$author" ] && byline="$author"
            [ -n "$note_created" ] && byline="${byline:+${byline} &middot; }${note_created}"
            [ -n "$written_by" ] && byline="${byline:+${byline} &middot; }${written_by}"
            awk -v cat="$category" -v bl="$byline" '/<h1[> ]/{if (cat != "") print "<p class=\"note-category-label\">" cat "</p>"; print; if (bl != "") print "<p class=\"note-byline\">" bl "</p>"; next}1' \
              "_site/en/${slug}.html" > _tmp.html && mv _tmp.html "_site/en/${slug}.html"
          done

          # ── Dutch notes → _site/nl/ ──────────────────────────────────────
          for f in content/nl/notes/*.md; do
            [ -f "$f" ] || continue
            slug=$(basename "${f%.md}")
            title=$(get_title "$f")
            category=$(get_field "$f" "category")
            author=$(get_field "$f" "author")
            note_created=$(get_field "$f" "created")
            note_modified=$(get_field "$f" "modified")
            note_version=$(get_field "$f" "version")
            written_by=$(get_field "$f" "written_by")
            translation=$(get_field "$f" "translation")

            # Language switcher: EN translation slug or fall back to EN index
            if [ -n "$translation" ]; then
              en_link="../en/${translation}.html"
            else
              en_link="../en/index.html"
            fi

            {
              echo '<nav class="site-nav">'
              echo '  <a class="nav-logo" href="index.html">Digital Garden</a>'
              echo '  <span class="nav-links">'
              echo '    <a href="index.html">HOME</a>'
              echo '    <span class="nav-sep">|</span>'
              echo '    <a href="about.html">OVER MIJ</a>'
              echo '  </span>'
              echo '  <span class="nav-right">'
              echo "    <span class=\"nav-lang\"><a href=\"${en_link}\">EN</a> &middot; <a href=\"${slug}.html\">NL</a></span>"
              echo '    <a class="nav-search" href="search.html">&#x1F50D;</a>'
              echo '  </span>'
              echo '</nav>'
              echo "<p><a class=\"nav-back\" href=\"index.html\">&larr; Terug</a></p>"
            } > _note_nav.html

            footer_text=""
            [ -n "$note_created" ] && footer_text="$note_created"
            [ -n "$note_modified" ] && footer_text="${footer_text:+${footer_text} &middot; gewijzigd ${note_modified}}"
            [ -n "$note_version" ] && footer_text="${footer_text:+${footer_text} &middot; }${note_version}"
            echo "<footer class=\"note-footer\"><small>${footer_text}</small></footer>" > _note_footer.html

            preprocess "$f" | pandoc \
              --standalone \
              --css ../style.css \
              --metadata pagetitle="$title" \
              --metadata title="" \
              --include-before-body _note_nav.html \
              --include-after-body _note_footer.html \
              --lua-filter .pandoc/wikilinks.lua \
              -o "_site/nl/${slug}.html"

            byline=""
            [ -n "$author" ] && byline="$author"
            [ -n "$note_created" ] && byline="${byline:+${byline} &middot; }${note_created}"
            [ -n "$written_by" ] && byline="${byline:+${byline} &middot; }${written_by}"
            awk -v cat="$category" -v bl="$byline" '/<h1[> ]/{if (cat != "") print "<p class=\"note-category-label\">" cat "</p>"; print; if (bl != "") print "<p class=\"note-byline\">" bl "</p>"; next}1' \
              "_site/nl/${slug}.html" > _tmp.html && mv _tmp.html "_site/nl/${slug}.html"
          done

      # ── Search index ─────────────────────────────────────────────────────
      - name: Build search index (Pagefind)
        run: npx pagefind --site _site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
